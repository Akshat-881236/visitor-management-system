<!-- public/Security/index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Security Portal | VMS</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

:root{
--primary:#2563eb;
--primary-dark:#1d4ed8;
--success:#16a34a;
--danger:#dc2626;
--warning:#f59e0b;
--dark:#0f172a;
--muted:#64748b;
--border:#e2e8f0;
--bg:#f8fafc;
--white:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
linear-gradient(
135deg,
#dbeafe 0%,
#eff6ff 30%,
#f8fafc 100%);
overflow-x:hidden;
}

.container{
width:100%;
max-width:500px;
background:rgba(255,255,255,.96);
backdrop-filter:blur(20px);
border-radius:32px;
padding:40px;
box-shadow:
0 20px 60px rgba(0,0,0,.08);
animation:fadeIn .5s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:90px;
height:90px;
object-fit:contain;
}

h1{
font-size:2rem;
color:var(--dark);
text-align:center;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:var(--muted);
line-height:1.6;
margin-bottom:35px;
}

.form{
display:block;
}

.hidden{
display:none;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
font-size:.95rem;
font-weight:600;
margin-bottom:8px;
color:var(--dark);
}

.input-box{
position:relative;
}

.input-box i{
position:absolute;
left:18px;
top:17px;
color:var(--muted);
font-size:1rem;
}

.input-box input{
width:100%;
padding:15px 18px 15px 50px;
border:1px solid var(--border);
border-radius:16px;
font-size:15px;
outline:none;
transition:.3s;
}

.input-box input:focus{
border-color:var(--primary);
box-shadow:
0 0 0 4px rgba(37,99,235,.12);
}

.btn{
width:100%;
border:none;
padding:16px;
border-radius:16px;
background:var(--primary);
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.btn:hover{
background:var(--primary-dark);
transform:translateY(-2px);
}

.footer{
margin-top:30px;
text-align:center;
font-size:13px;
color:var(--muted);
}

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal{
width:100%;
max-width:420px;
background:white;
border-radius:25px;
padding:30px;
animation:pop .3s ease;
}

@keyframes pop{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

.modal-icon{
font-size:3rem;
text-align:center;
margin-bottom:15px;
color:var(--primary);
}

.modal h2{
text-align:center;
margin-bottom:12px;
color:var(--dark);
}

.modal p{
text-align:center;
line-height:1.6;
color:var(--muted);
margin-bottom:25px;
}

.modal-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.modal-actions button{
flex:1;
border:none;
padding:14px;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.primary-btn{
background:var(--primary);
color:white;
}

.secondary-btn{
background:#e2e8f0;
}

.learn-btn{
background:var(--warning);
color:white;
}

@media(max-width:768px){

.container{
padding:30px;
}

h1{
font-size:1.7rem;
}

}

@media(max-width:480px){

body{
padding:10px;
}

.container{
padding:25px 20px;
border-radius:25px;
}

.logo img{
width:75px;
height:75px;
}

h1{
font-size:1.5rem;
}

.subtitle{
font-size:.9rem;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img src="/svg/logo/vms.svg"
alt="Security">

</div>

<h1>Security Portal</h1>

<p class="subtitle">
Secure access for Security Personnel.<br>
Two-factor authentication enabled.
</p>

<!-- LOGIN FORM -->

<form
id="loginForm"
class="form">

<div class="form-group">

<label>Employee ID</label>

<div class="input-box">

<i class="bi bi-person-badge"></i>

<input
type="text"
id="emp_id"
placeholder="Enter Employee ID">

</div>

</div>

<div class="form-group">

<label>Password</label>

<div class="input-box">

<i class="bi bi-shield-lock"></i>

<input
type="password"
id="password"
placeholder="Enter Password">

</div>

</div>

<button
type="submit"
class="btn">

<i class="bi bi-send-check"></i>
Send OTP

</button>

</form>

<!-- OTP FORM -->

<form
id="otpForm"
class="form hidden">

<div class="form-group">

<label>Verification OTP</label>

<div class="input-box">

<i class="bi bi-key"></i>

<input
type="text"
maxlength="6"
id="otp"
placeholder="Enter 6 Digit OTP">

</div>

</div>

<button
type="submit"
class="btn">

<i class="bi bi-check-circle"></i>
Verify OTP

</button>

</form>

<div class="footer">

Visitor Management System © 2026

</div>

</div>

<!-- MODAL -->

<div
class="modal-overlay"
id="modalOverlay">

<div class="modal">

<div
class="modal-icon"
id="modalIcon">

<i class="bi bi-info-circle"></i>

</div>

<h2 id="modalTitle"></h2>

<p id="modalMessage"></p>

<div class="modal-actions">

<button
class="primary-btn"
onclick="closeModal()">

OK

</button>

<button
class="learn-btn"
id="learnBtn">

Learn More

</button>

</div>

</div>

</div>

<script>

let currentEmpId='';

function showModal(
title,
message,
learn='#'
){

document.getElementById(
'modalTitle'
).innerText=title;

document.getElementById(
'modalMessage'
).innerText=message;

document.getElementById(
'learnBtn'
).onclick=()=>{
window.open(
learn,
'_blank'
);
};

document.getElementById(
'modalOverlay'
).style.display='flex';

}

function closeModal(){

document.getElementById(
'modalOverlay'
).style.display='none';

}

document.getElementById(
'loginForm'
).addEventListener(
'submit',
async e=>{

e.preventDefault();

const empId=
document.getElementById(
'emp_id'
).value.trim();

const password=
document.getElementById(
'password'
).value.trim();

if(
!empId||
!password
){

return showModal(
'Validation Error',
'Employee ID and Password are required.'
);

}

try{

const response=
await fetch(
'/api/security/login',
{
method:'POST',

headers:{
'Content-Type':
'application/json'
},

body:JSON.stringify({

emp_id:empId,

password
})
}
);

const data=
await response.json();

if(!data.success){

return showModal(
'Login Failed',
data.message
);

}

currentEmpId=empId;

document.getElementById(
'loginForm'
).classList.add(
'hidden'
);

document.getElementById(
'otpForm'
).classList.remove(
'hidden'
);

showModal(
'OTP Sent',
'Verification OTP has been sent to your registered email.'
);

}catch(error){

showModal(
'Network Error',
error.message
);

}

});

document.getElementById(
'otpForm'
).addEventListener(
'submit',
async e=>{

e.preventDefault();

const otp=
document.getElementById(
'otp'
).value.trim();

if(
!/^\d{6}$/.test(otp)
){

return showModal(
'Invalid OTP',
'Please enter a valid 6 digit OTP.'
);

}

try{

const response=
await fetch(
'/api/security/verify-otp',
{
method:'POST',

headers:{
'Content-Type':
'application/json'
},

body:JSON.stringify({

emp_id:currentEmpId,

otp
})
}
);

const data=
await response.json();

if(!data.success){

return showModal(
'Verification Failed',
data.message
);

}

localStorage.setItem(
'security_session_id',
data.session.session_id
);

localStorage.setItem(
'security_user',
JSON.stringify(
data.session
)
);

if(data.firstLogin){

const newPassword=
prompt(
'First Login Detected.\n\nEnter New Password'
);

if(
!newPassword||
newPassword.length<8
){

return showModal(
'Password Required',
'Password must contain minimum 8 characters.'
);

}

await fetch(
'/api/security/change-password',
{
method:'POST',

headers:{
'Content-Type':
'application/json'
},

body:JSON.stringify({

emp_id:currentEmpId,

newPassword
})
}
);

}

showModal(
'Login Successful',
'Redirecting to dashboard...'
);

setTimeout(()=>{

window.location.href=
data.redirect;

},1500);

}catch(error){

showModal(
'Network Error',
error.message
);

}

});

</script>

</body>
</html>
