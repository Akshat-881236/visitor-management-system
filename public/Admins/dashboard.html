<!-- public/Admins/dashboard.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard | VMS</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #fff;
            --border: #e2e8f0;
            --text: #0f172a;
            --muted: #64748b;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, .05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            width: 50px;
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        .container {
            width: min(95%, 1400px);
            margin: auto;
            padding: 25px 0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .05);
        }

        .card h2 {
            margin-top: 10px;
            font-size: 2rem;
        }

        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .tab-btn {
            border: none;
            background: white;
            padding: 14px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .table-wrapper {
            overflow-x: auto;
            background: white;
            border-radius: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 18px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #eff6ff;
        }

        td img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
        }

        .action-btn {
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            margin-right: 5px;
        }

        .approve {
            background: var(--success);
        }

        .reject {
            background: var(--danger);
        }

        .status {
            padding: 8px 12px;
            border-radius: 20px;
            color: white;
            font-size: 13px;
        }

        .PENDING {
            background: var(--warning);
        }

        .APPROVED {
            background: var(--success);
        }

        .REJECTED {
            background: var(--danger);
        }

        /* Modal */

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal {
            width: 95%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 20px;
        }

        .modal input,
        .modal textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .modal button {
            border: none;
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }

        .save-btn {
            background: var(--primary);
        }

        .close-btn {
            background: var(--danger);
        }

        @media(max-width:768px) {

            table,
            tbody,
            tr,
            td,
            th,
            thead {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                margin-bottom: 20px;
                background: white;
                border-radius: 20px;
                padding: 20px;
            }

            td {
                border: none;
                padding: 10px 0;
            }

            td::before {
                font-weight: bold;
                display: block;
            }
        }
    </style>

</head>

<body>

    <header>

        <div class="logo">

            <img src="/svg/logo/vms.svg">

            <div>
                <h2>VMS Dashboard</h2>
                <small id="adminName"></small>
            </div>

        </div>

        <button
            class="logout-btn"
            onclick="logout()">

            <i class="bi bi-box-arrow-right"></i>
            Logout

        </button>

    </header>

    <div class="container">

        <section class="stats">

            <div class="card">
                <i class="bi bi-clock-history"></i>
                <h2 id="pendingCount">0</h2>
                <p>Pending</p>
            </div>

            <div class="card">
                <i class="bi bi-check-circle"></i>
                <h2 id="approvedCount">0</h2>
                <p>Approved</p>
            </div>

            <div class="card">
                <i class="bi bi-x-circle"></i>
                <h2 id="rejectedCount">0</h2>
                <p>Rejected</p>
            </div>

            <div class="card">
                <i class="bi bi-people"></i>
                <h2 id="totalCount">0</h2>
                <p>Total</p>
            </div>

        </section>

        <section class="tabs">

            <button
                class="tab-btn active"
                onclick="switchTab('requests',this)">

                Visitor Requests

            </button>

        </section>

        <section
            id="requests"
            class="tab-content active">

            <div class="table-wrapper">

                <table>

                    <thead>

                        <tr>
                            <th>Photo</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>

                    </thead>

                    <tbody id="visitorTable"></tbody>

                </table>

            </div>

        </section>

    </div>

    <!-- Modal -->

    <div
        class="modal-overlay"
        id="modalOverlay">

        <div class="modal"
            id="modalContent"></div>

    </div>

    <script>

        const sessionId =
            new URLSearchParams(
                location.search
            ).get('session_id');

        const admin =
            JSON.parse(
                localStorage.getItem('vms_admin')
            );

        document.getElementById(
            'adminName'
        ).innerText =
            admin?.admin_name || '';

        async function validateSession() {

            const response =
                await fetch(
                    `/api/admin/validate-session/${sessionId}`
                );

            const data =
                await response.json();

            if (!data.success) {

                localStorage.clear();

                location.href =
                    '/admin';

            }
        }

        async function loadVisitors() {

            const response =
                await fetch(
                    `/api/admin/visitors?session_id=${sessionId}`
                );

            const data =
                await response.json();

            if (!data.success) return;

            const tbody =
                document.getElementById(
                    'visitorTable'
                );

            tbody.innerHTML = '';

            let pending = 0,
                approved = 0,
                rejected = 0;

            data.visitors.forEach(v => {

                if (v.status === 'PENDING') pending++;
                if (v.status === 'APPROVED') approved++;
                if (v.status === 'REJECTED') rejected++;

                tbody.innerHTML += `

                <tr>

                    <td>
                        <img src="${v.photo_path}">
                    </td>

                    <td>${v.full_name}</td>

                    <td>${v.email}</td>

                    <td>${v.contact_number}</td>

                    <td>
                        <span class="status ${v.status}">
                            ${v.status}
                        </span>
                    </td>

                    <td>

                        ${v.status === 'PENDING'
                        ? `
                        <button
                        class="action-btn approve"
                        onclick="approveModal(${v.id})">

                        Approve

                        </button>

                        <button
                        class="action-btn reject"
                        onclick="rejectModal(${v.id})">

                        Reject

                        </button>
                        `
                        : '-'}

                    </td>

                </tr>

                `;
            });

            document.getElementById(
                'pendingCount'
            ).innerText = pending;

            document.getElementById(
                'approvedCount'
            ).innerText = approved;

            document.getElementById(
                'rejectedCount'
            ).innerText = rejected;

            document.getElementById(
                'totalCount'
            ).innerText =
                data.visitors.length;
        }

        function approveModal(id) {

            document.getElementById(
                'modalContent'
            ).innerHTML = `

            <h2>Approve Visitor</h2>

            <input id="empName"
            placeholder="Employee Name">

            <input id="dept"
            placeholder="Department">

            <input type="date"
            id="visitDate">

            <input type="time"
            id="visitTime">

            <button class="save-btn"
            onclick="approveVisitor(${id})">

            Approve

            </button>

            <button class="close-btn"
            onclick="closeModal()">

            Cancel

            </button>
            `;

            document.getElementById(
                'modalOverlay'
            ).style.display = 'flex';
        }

        async function approveVisitor(id) {

            const employeeName =
                document.getElementById('empName').value.trim();

            const department =
                document.getElementById('dept').value.trim();

            const visitDate =
                document.getElementById('visitDate').value;

            const visitTime =
                document.getElementById('visitTime').value;

            if (
                !employeeName ||
                !department ||
                !visitDate ||
                !visitTime
            ) {
                alert('Please fill all fields');
                return;
            }

            try {

                const response =
                    await fetch(
                        `/api/admin/approve/${id}?session_id=${sessionId}`,
                        {
                            method: 'POST',

                            headers: {
                                'Content-Type': 'application/json'
                            },

                            body: JSON.stringify({

                                host_employee_name:
                                    employeeName,

                                host_department:
                                    department,

                                visit_date:
                                    visitDate,

                                visit_time:
                                    visitTime
                            })
                        });

                const data =
                    await response.json();

                console.log(data);

                if (!data.success) {

                    alert(
                        data.message ||
                        'Approval failed'
                    );

                    return;
                }

                alert(
                    'Visitor Approved Successfully'
                );

                closeModal();

                await loadVisitors();

            } catch (error) {

                console.error(error);

                alert(
                    'Network Error'
                );
            }
        }

        function rejectModal(id) {

            document.getElementById(
                'modalContent'
            ).innerHTML = `

            <h2>Reject Visitor</h2>

            <textarea
            id="reason"
            placeholder="Reason"></textarea>

            <button class="save-btn"
            onclick="rejectVisitor(${id})">

            Reject

            </button>

            <button class="close-btn"
            onclick="closeModal()">

            Cancel

            </button>
            `;

            document.getElementById(
                'modalOverlay'
            ).style.display = 'flex';
        }

        async function rejectVisitor(id) {

            await fetch(
                `/api/admin/reject/${id}?session_id=${sessionId}`,
                {
                    method: 'POST',

                    headers: {
                        'Content-Type': 'application/json'
                    },

                    body: JSON.stringify({
                        reason:
                            reason.value
                    })
                });

            closeModal();
            loadVisitors();
        }

        function closeModal() {

            document.getElementById(
                'modalOverlay'
            ).style.display = 'none';
        }

        async function logout() {

            await fetch(
                '/api/admin/logout',
                {
                    method: 'POST'
                });

            localStorage.clear();

            location.href =
                '/admin';
        }

        function switchTab(id, btn) {

            document
                .querySelectorAll('.tab-btn')
                .forEach(
                    b => b.classList.remove('active')
                );

            btn.classList.add('active');
        }

        validateSession();
        loadVisitors();

        setInterval(
            loadVisitors,
            30000
        );

    </script>

</body>

</html>
