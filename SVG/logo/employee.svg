<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <!-- Lanyard Clip Assembly (Top) -->
  <path d="M14 2 H18 V5 H14 Z" fill="#94A3B8" />
  <rect x="12" y="3.5" width="8" height="2.5" rx="1" fill="#64748B" />

  <!-- Outer Card Shell (Deep Navy/Slate) -->
  <rect x="5" y="5" width="22" height="25" rx="3" fill="#0F172A" />
  
  <!-- Inner Card Face -->
  <rect x="6" y="6" width="20" height="23" rx="2" fill="#1E293B" />

  <!-- Employee Avatar: Head -->
  <circle cx="16" cy="13" r="3.5" fill="#38BDF8" />

  <!-- Employee Avatar: Shoulders/Torso -->
  <path d="M10 21 C10 18 12.5 17 16 17 C19.5 17 22 18 22 21 V22 H10 Z" fill="#0284C7" />

  <!-- Abstract "ID Barcode / Data Lines" at bottom of card -->
  <rect x="9" y="24.5" width="8" height="1.5" rx="0.75" fill="#475569" />
  <rect x="18.5" y="24.5" width="4.5" height="1.5" rx="0.75" fill="#475569" />

  <!-- Cutout Ring (Matches Outer Shell to create a negative-space gap) -->
  <circle cx="24" cy="24" r="4.5" fill="#0F172A" /> 
  
  <!-- "Active Staff" Verification Badge -->
  <circle cx="24" cy="24" r="3.5" fill="#10B981" />
  
  <!-- Crisp Checkmark inside the Badge -->
  <path d="M22.5 24 L23.5 25 L25.5 22.5" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
